<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Mulago Hospital</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🏥</div>
      <h2>Mulago Hospital Admin</h2>
      <p>Staff Portal · Secure Access</p>
    </div>

    <div id="login-error" class="login-error"></div>

    <form id="admin-login-form" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Sign In to Dashboard</button>
    </form>

    <p class="login-hint">
      Demo credentials: <strong>admin</strong> / <strong>mulago2024</strong><br>
      <a href="../index_public.html" style="color:var(--teal-600)">← Back to Public Site</a>
    </p>
  </div>
</div>
<script src="../js/admin.js"></script>
</body>
</html>
